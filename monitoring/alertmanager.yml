global:
  resolve_timeout: 5m

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

receivers:
  - name: default
    # Configure your notification channel here, e.g.:
    # slack_configs:
    #   - api_url: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
    #     channel: '#alerts'
    #     send_resolved: true
